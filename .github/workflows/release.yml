name: NewTermux Full Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: true
        default: 'v1.1.4'

jobs:
  patch-bootstraps:
    name: Patch Bootstrap (${{ matrix.arch }})
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        arch: [aarch64, arm, x86_64, i686]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update -q && sudo apt-get install -y patchelf jq zip

      - name: Download official Termux bootstrap
        run: |
          RELEASE_JSON=$(curl -s "https://api.github.com/repos/termux/termux-packages/releases/latest")
          DOWNLOAD_URL=$(echo "$RELEASE_JSON" | jq -r --arg arch "bootstrap-${{ matrix.arch }}.zip" '.assets[] | select(.name == $arch) | .browser_download_url')
          curl -L -o "bootstrap-${{ matrix.arch }}.zip" "$DOWNLOAD_URL"

      - name: Patch bootstrap paths
        run: |
          chmod +x scripts/patch-bootstrap.sh
          ./scripts/patch-bootstrap.sh ${{ matrix.arch }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: bootstrap-${{ matrix.arch }}.zip
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-apk:
    name: Build NewTermux APK
    needs: patch-bootstraps
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APKs
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug assembleRelease

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
