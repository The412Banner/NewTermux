name: Build NewTermux Bootstrap Packages

on:
  workflow_dispatch:
    inputs:
      arch:
        description: 'Architecture to build for'
        required: true
        default: 'aarch64'
        type: choice
        options:
          - aarch64
          - arm
          - x86_64
          - i686
          - all
  push:
    tags:
      - 'bootstrap-*'

jobs:
  determine-arches:
    runs-on: ubuntu-latest
    outputs:
      arches: ${{ steps.set-arches.outputs.arches }}
    steps:
      - id: set-arches
        run: |
          INPUT="${{ github.event.inputs.arch || 'aarch64' }}"
          if [ "$INPUT" = "all" ]; then
            echo 'arches=["aarch64","arm","x86_64","i686"]' >> $GITHUB_OUTPUT
          else
            echo "arches=[\"$INPUT\"]" >> $GITHUB_OUTPUT
          fi

  patch-bootstrap:
    needs: determine-arches
    name: Patch Bootstrap (${{ matrix.arch }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        arch: ${{ fromJson(needs.determine-arches.outputs.arches) }}

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y patchelf jq

      - name: Download official Termux bootstrap
        run: |
          ARCH="${{ matrix.arch }}"
          echo "Finding latest termux-packages bootstrap release for $ARCH..."
          RELEASE_JSON=$(curl -s "https://api.github.com/repos/termux/termux-packages/releases/latest")
          RELEASE_TAG=$(echo "$RELEASE_JSON" | jq -r '.tag_name')
          echo "Latest release tag: $RELEASE_TAG"

          DOWNLOAD_URL=$(echo "$RELEASE_JSON" \
            | jq -r ".assets[] | select(.name == \"bootstrap-${ARCH}.zip\") | .browser_download_url")

          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "::error::bootstrap-${ARCH}.zip not found in latest release ($RELEASE_TAG)"
            echo "Available assets:"
            echo "$RELEASE_JSON" | jq -r '.assets[].name'
            exit 1
          fi

          echo "Downloading: $DOWNLOAD_URL"
          curl -L --retry 3 -o "bootstrap-${ARCH}.zip" "$DOWNLOAD_URL"
          echo "Downloaded: $(du -sh bootstrap-${ARCH}.zip | cut -f1)"

      - name: Patch bootstrap paths
        run: |
          ARCH="${{ matrix.arch }}"
          OLD_PKG="com.termux"
          NEW_PKG="com.newtermux.app"
          OLD_PREFIX="/data/data/${OLD_PKG}/files"
          NEW_PREFIX="/data/data/${NEW_PKG}/files"

          echo "Patching: $OLD_PREFIX → $NEW_PREFIX"

          mkdir -p bootstrap-extract
          unzip -q "bootstrap-${ARCH}.zip" -d bootstrap-extract/
          cd bootstrap-extract

          # 1. Patch SYMLINKS.txt (absolute symlink targets)
          if [ -f SYMLINKS.txt ]; then
            sed -i "s|${OLD_PREFIX}|${NEW_PREFIX}|g" SYMLINKS.txt
            echo "Patched SYMLINKS.txt"
          fi

          # 2. Patch text files: shebangs, scripts, config files
          echo "Patching text files..."
          TEXT_COUNT=0
          while IFS= read -r -d '' f; do
            if file "$f" 2>/dev/null | grep -qiE 'text|script|ASCII|source|shell|python|perl|ruby'; then
              if grep -qF "$OLD_PREFIX" "$f" 2>/dev/null; then
                sed -i "s|${OLD_PREFIX}|${NEW_PREFIX}|g" "$f"
                TEXT_COUNT=$((TEXT_COUNT + 1))
              fi
            fi
          done < <(find . -type f -print0)
          echo "Patched $TEXT_COUNT text files"

          # 3. Patch ELF rpaths using patchelf
          echo "Patching ELF rpaths..."
          ELF_COUNT=0
          ELF_FAILED=0
          while IFS= read -r -d '' f; do
            if file "$f" 2>/dev/null | grep -q 'ELF'; then
              RPATH=$(patchelf --print-rpath "$f" 2>/dev/null || true)
              if echo "$RPATH" | grep -qF "$OLD_PKG"; then
                NEW_RPATH=$(echo "$RPATH" | sed "s|${OLD_PREFIX}|${NEW_PREFIX}|g")
                if patchelf --set-rpath "$NEW_RPATH" "$f" 2>/dev/null; then
                  ELF_COUNT=$((ELF_COUNT + 1))
                else
                  ELF_FAILED=$((ELF_FAILED + 1))
                fi
              fi
            fi
          done < <(find . -type f -print0)
          echo "Patched $ELF_COUNT ELF files (${ELF_FAILED} skipped)"

          # 4. Verification
          echo "=== Verification ==="
          REMAINING_TXT=$(find . -type f | xargs grep -lF "$OLD_PREFIX" 2>/dev/null | grep -vE '\.(pyc|class|jar)$' | wc -l || echo 0)
          echo "Files still containing old prefix: $REMAINING_TXT"
          if [ "$REMAINING_TXT" -gt 0 ]; then
            echo "Files with remaining references:"
            find . -type f | xargs grep -lF "$OLD_PREFIX" 2>/dev/null | grep -vE '\.(pyc|class|jar)$' | head -20
          fi

          ELF_REMAINING=$(find . -type f | while read f; do
            file "$f" 2>/dev/null | grep -q 'ELF' && patchelf --print-rpath "$f" 2>/dev/null | grep -qF "$OLD_PKG" && echo "$f"
          done | wc -l)
          echo "ELF files with old rpath still: $ELF_REMAINING"

      - name: Repack bootstrap
        run: |
          ARCH="${{ matrix.arch }}"
          cd bootstrap-extract
          zip -q -r "../bootstrap-${ARCH}.zip" .
          cd ..
          echo "Repacked: $(du -sh bootstrap-${ARCH}.zip | cut -f1)"

      - name: Collect bootstrap
        run: |
          mkdir -p bootstrap-output
          cp bootstrap-*.zip bootstrap-output/
          ls -lh bootstrap-output/

      - name: Upload bootstrap artifact
        uses: actions/upload-artifact@v4
        with:
          name: newtermux-bootstrap-${{ matrix.arch }}
          path: bootstrap-output/bootstrap-${{ matrix.arch }}.zip
          retention-days: 90

      - name: Create Bootstrap Release
        if: startsWith(github.ref, 'refs/tags/bootstrap-')
        uses: softprops/action-gh-release@v1
        with:
          files: bootstrap-output/*.zip
          body: |
            NewTermux Bootstrap Packages for prefix: /data/data/com.newtermux.app/files/usr

            Patched from official termux-packages bootstrap with com.termux → com.newtermux.app prefix replacement.

            ## Installation
            These bootstrap archives are automatically used by the NewTermux app on first launch.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
