name: Build NewTermux Bootstrap

on:
  workflow_dispatch:
    inputs:
      arch:
        description: 'Architecture to build (aarch64, arm, i686, x86_64)'
        required: true
        default: 'aarch64'

jobs:
  build-bootstrap:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout NewTermux
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf zip unzip

      - name: Download official bootstrap
        run: |
          ARCH_INPUT="${{ github.event.inputs.arch }}"
          if [ "$ARCH_INPUT" = "all" ]; then
            ARCHES="aarch64 arm x86_64 i686"
          else
            ARCHES="$ARCH_INPUT"
          fi
          
          for ARCH in $ARCHES; do
            URL="https://github.com/termux/termux-packages/releases/latest/download/bootstrap-${ARCH}.zip"
            echo "Downloading bootstrap for $ARCH from $URL..."
            curl -L "$URL" -o "bootstrap-${ARCH}.zip"
          done

      - name: Patch Bootstrap
        run: |
          ARCH_INPUT="${{ github.event.inputs.arch }}"
          if [ "$ARCH_INPUT" = "all" ]; then
            ARCHES="aarch64 arm x86_64 i686"
          else
            ARCHES="$ARCH_INPUT"
          fi
          
          OLD_ID="com.termux"
          NEW_ID="com.newtermux.app"
          
          for ARCH in $ARCHES; do
            echo "Processing architecture: $ARCH"
            mkdir "extract_${ARCH}"
            unzip -q "bootstrap-${ARCH}.zip" -d "extract_${ARCH}/"
            pushd "extract_${ARCH}"
            
            echo "1. Patching text files and shebangs for $ARCH..."
            grep -rIl "$OLD_ID" . | xargs sed -i "s|$OLD_ID|$NEW_ID|g" || true
            
            echo "2. Patching ELF binaries for $ARCH..."
            find . -type f | while read f; do
              if file "$f" | grep -q 'ELF'; then
                # Update RPATH
                OLD_RPATH=$(patchelf --print-rpath "$f" 2>/dev/null || true)
                if [ -n "$OLD_RPATH" ]; then
                  NEW_RPATH=$(echo "$OLD_RPATH" | sed "s|$OLD_ID|$NEW_ID|g")
                  patchelf --set-rpath "$NEW_RPATH" "$f" 2>/dev/null || true
                fi
                
                # Update Interpreter
                OLD_INTERP=$(patchelf --print-interpreter "$f" 2>/dev/null || true)
                if [ -n "$OLD_INTERP" ] && echo "$OLD_INTERP" | grep -q "$OLD_ID"; then
                  NEW_INTERP=$(echo "$OLD_INTERP" | sed "s|$OLD_ID|$NEW_ID|g")
                  patchelf --set-interpreter "$NEW_INTERP" "$f" 2>/dev/null || true
                fi
              fi
            done
            
            echo "3. Updating SYMLINKS.txt for $ARCH..."
            if [ -f SYMLINKS.txt ]; then
              sed -i "s|$OLD_ID|$NEW_ID|g" SYMLINKS.txt
            fi
            
            echo "4. MOTD update for $ARCH..."
            if [ -f etc/motd ]; then
              echo "Welcome to NewTermux!" > etc/motd
            fi
            
            echo "5. Repacking $ARCH..."
            zip -q -r "../bootstrap-${ARCH}.zip" .
            popd
            rm -rf "extract_${ARCH}"
          done
          
      - name: Upload Bootstrap
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-all
          path: bootstrap-*.zip

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: bootstrap-*.zip
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
